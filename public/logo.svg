<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" fill="none">
  <!-- Truck icon -->
  <g transform="translate(2, 4)">
    <!-- Building/warehouse body -->
    <rect x="0" y="10" width="30" height="24" rx="2" fill="#1B5DE5"/>
    <rect x="2" y="12" width="8" height="8" rx="1" fill="#F0C646"/>
    <rect x="12" y="12" width="8" height="8" rx="1" fill="#F0C646"/>
    <rect x="2" y="22" width="18" height="10" rx="1" fill="#0D3A9E"/>
    <!-- Roof -->
    <polygon points="15,4 31,10 -1,10" fill="#F0C646"/>
    <!-- Truck body -->
    <rect x="22" y="22" width="22" height="12" rx="2" fill="#0A1F4E"/>
    <rect x="36" y="16" width="8" height="8" rx="1" fill="#1B5DE5"/>
    <circle cx="26" cy="36" r="3" fill="#F0C646"/>
    <circle cx="38" cy="36" r="3" fill="#F0C646"/>
    <!-- Exhaust pipe -->
    <rect x="43" y="14" width="2" height="6" rx="1" fill="#374151"/>
  </g>

  <!-- KAUNDA text -->
  <text x="52" y="28" font-family="Montserrat, sans-serif" font-weight="700" font-size="20" fill="#0A1F4E" letter-spacing="1">KAUNDA</text>
  <!-- Subtitle -->
  <text x="53" y="42" font-family="Open Sans, sans-serif" font-weight="400" font-size="9" fill="#4B5563" letter-spacing="0.5">Waste Management LTD</text>
  <!-- Gold accent underline -->
  <rect x="52" y="47" width="140" height="2.5" rx="1.25" fill="#F0C646"/>
</svg>
